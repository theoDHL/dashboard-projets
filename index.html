<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Service Projets</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{--red:#D40511;--yellow:#FFCC00;--dark:#1A1A1A;--mid:#666;--light:#AAA;--border:#EBEBEB;--bg:#F7F7F7;--white:#FFFFFF}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
  .topbar{background:var(--red);padding:.7rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar-left{display:flex;align-items:center;gap:1.25rem}
  .logo{background:var(--yellow);color:var(--dark);font-size:13px;font-weight:900;padding:3px 9px;border-radius:2px;letter-spacing:.05em}
  .topbar-title{color:#fff;font-size:14px;font-weight:600;letter-spacing:.03em}
  .topbar-right{display:flex;align-items:center;gap:1.25rem}
  .sync-info{color:rgba(255,255,255,.7);font-size:11px;display:flex;align-items:center;gap:5px}
  .sync-dot{width:7px;height:7px;background:var(--yellow);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .last-update{color:rgba(255,255,255,.6);font-size:11px}
  .proj-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:3px;padding:4px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer}
  .proj-btn:hover{background:rgba(255,255,255,.25)}
  .nav{display:flex;background:var(--white);border-bottom:2px solid var(--red);padding:0 2rem}
  .nb{padding:10px 20px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:700;color:var(--light);letter-spacing:.08em;text-transform:uppercase;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
  .nb.act{color:var(--red);border-bottom-color:var(--red)}
  .nb:hover:not(.act){color:var(--dark)}
  .content{padding:1.25rem 2rem;max-width:1600px;margin:0 auto}
  .hbar{background:var(--red);border-radius:4px;padding:.65rem 1.1rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
  .hbar .ht{color:#fff;font-size:13px;font-weight:700;letter-spacing:.03em}
  .hbar .hd{color:rgba(255,255,255,.6);font-size:11px}
  .astrip{background:#FFF8D6;border-left:3px solid var(--yellow);border-radius:3px;padding:.5rem .9rem;font-size:11px;font-weight:600;color:#7A5C00;margin-bottom:1rem;display:flex;align-items:center;gap:6px}
  .krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1.1rem}
  .kpi{border-radius:10px;padding:.9rem 1rem .75rem;position:relative;overflow:hidden}
  .kbar{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 10px 10px}
  .kl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px}
  .kv{font-size:22px;font-weight:400;line-height:1;letter-spacing:-.01em;margin-bottom:3px}
  .ks{font-size:10px;opacity:.65;padding-bottom:5px}
  .kr{background:#FDE8E8}.kr .kl{color:#9B1B1B}.kr .kv{color:var(--red)}.kr .ks{color:#9B1B1B}.kr .kbar{background:var(--red)}
  .ky{background:#FFF8D6}.ky .kl{color:#7A5C00}.ky .kv{color:#B08500}.ky .ks{color:#7A5C00}.ky .kbar{background:var(--yellow)}
  .kg{background:#F2F2F0}.kg .kl{color:#555}.kg .kv{color:var(--dark)}.kg .ks{color:#666}.kg .kbar{background:#BBBBBB}
  .kd{background:#E8E8E8}.kd .kl{color:#444}.kd .kv{color:var(--dark)}.kd .ks{color:#555}.kd .kbar{background:#888}
  .card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.1rem;margin-bottom:.9rem}
  .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;padding-bottom:.6rem;border-bottom:1px solid #F3F3F3}
  .ct{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--light)}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem}
  .g31{display:grid;grid-template-columns:3fr 2fr;gap:.9rem;margin-bottom:.9rem}
  @media(max-width:900px){.g2,.g31{grid-template-columns:1fr}}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;padding:7px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--light);border-bottom:1px solid #F0F0F0}
  td{padding:9px 8px;border-bottom:1px solid #F7F7F7;vertical-align:middle}
  tr:last-child td{border:none}
  tr:hover td{background:#FAFAFA}
  .pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .pr{background:#FDE8E8;color:#C62828}.pa{background:#FFF8D6;color:#F57F17}
  .pg{background:#E8F5E9;color:#2E7D32}.pb{background:#E3F2FD;color:#1565C0}.pgy{background:#F5F5F5;color:#757575}
  .pbar{height:4px;background:#F0F0F0;border-radius:2px;overflow:hidden}
  .pf{height:4px;border-radius:2px;transition:width .4s}
  .ch{position:relative;width:100%}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
  .sec{display:none}.sec.on{display:block}
  .leg{display:flex;flex-wrap:wrap;gap:10px}
  .leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--light)}
  .leg-sq{width:8px;height:8px;border-radius:1px;flex-shrink:0}
  .dat-table{width:100%;border-collapse:collapse;font-size:12px}
  .dat-table th{background:#F7F7F7;padding:9px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--light);border-bottom:2px solid var(--border);white-space:nowrap;text-align:left}
  .dat-table td{padding:6px 6px;border-bottom:1px solid #F5F5F5;vertical-align:middle}
  .dat-table tr:hover td{background:#FAFAFA}
  .dat-table tr:last-child td{border:none}
  .dat-input{border:1px solid var(--border);border-radius:3px;padding:5px 7px;font-size:12px;background:var(--white);color:var(--dark);width:100%}
  .dat-input:focus{outline:none;border-color:var(--red);background:#FFF8F8}
  .btn-add{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--dark);color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .btn-add:hover{background:#333}
  .btn-add-sm{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;background:#F7F7F7;color:var(--dark);border:1px solid var(--border);border-radius:3px;cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .btn-add-sm:hover{background:#EBEBEB}
  .btn-del{width:26px;height:26px;background:#FDE8E8;color:var(--red);border:none;border-radius:3px;cursor:pointer;font-size:13px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  .btn-del:hover{background:#FBBCBB}
  .savebtn{padding:10px 26px;background:var(--red);color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;transition:background .15s}
  .savebtn:hover{background:#B30010}
  .btn-row{display:flex;align-items:center;gap:10px;margin-top:.75rem;flex-wrap:wrap}
  .fin-proj-block{border:1px solid var(--border);border-radius:8px;margin-bottom:.75rem;overflow:hidden}
  .fin-proj-header{background:#F7F7F7;padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;gap:1rem;flex-wrap:wrap}
  .fin-proj-header:hover{background:#F0F0F0}
  .fin-proj-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;min-width:0}
  .fin-proj-stats{display:flex;align-items:center;gap:14px;font-size:12px;flex-wrap:wrap}
  .fin-proj-body{padding:1rem}
  .fin-proj-body.collapsed{display:none}
  .env-row{display:flex;align-items:center;gap:12px;margin-bottom:.9rem;padding-bottom:.9rem;border-bottom:1px solid #F5F5F5;flex-wrap:wrap}
  .env-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--light)}
  .env-input{border:1px solid var(--border);border-radius:3px;padding:6px 10px;font-size:14px;font-weight:500;color:var(--dark);background:var(--white);width:160px}
  .env-input:focus{outline:none;border-color:var(--red)}
  .devis-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:.75rem}
  .devis-table th{text-align:left;padding:7px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--light);border-bottom:1px solid #F0F0F0;background:#FAFAFA}
  .devis-table td{padding:6px 7px;border-bottom:1px solid #F7F7F7;vertical-align:middle}
  .devis-table tr:last-child td{border:none}
  .devis-table input[type="text"]{border:1px solid var(--border);border-radius:3px;padding:5px 7px;font-size:12px;background:var(--white);color:var(--dark);width:100%}
  .devis-table input[type="number"]{border:1px solid var(--border);border-radius:3px;padding:5px 7px;font-size:12px;background:var(--white);color:var(--dark);width:130px}
  .devis-table input:focus{outline:none;border-color:var(--red)}
  .devis-footer{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0 .5rem;border-top:2px solid var(--border);margin-top:4px;flex-wrap:wrap;gap:10px}
  .devis-total-zone{display:flex;align-items:center;gap:10px}
  .devis-total-label{font-size:11px;color:var(--light);font-weight:600}
  .devis-total-val{font-size:16px;font-weight:700}
  .trend-table{border-collapse:collapse;font-size:12px}
  .trend-table th{background:#F7F7F7;padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--light);border-bottom:2px solid var(--border);text-align:left}
  .trend-table td{padding:5px 6px;border-bottom:1px solid #F5F5F5;vertical-align:middle}
  .trend-table input{border:1px solid var(--border);border-radius:3px;padding:5px 7px;font-size:12px;background:var(--white);color:var(--dark)}
  .trend-table input:focus{outline:none;border-color:var(--red)}
  .toast{position:fixed;bottom:20px;right:20px;background:#2E7D32;color:#fff;padding:10px 18px;border-radius:4px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
  .toast.show{opacity:1}
  body.projection .kv{font-size:28px}
  body.projection .kpi{padding:1.1rem 1.2rem 1rem}

  .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
  .modal-box{background:#fff;border-radius:12px;padding:2rem;width:650px;max-width:95vw;position:relative;max-height:90vh;overflow-y:auto}
  .modal-title{font-size:17px;font-weight:700;margin-bottom:.25rem}
  .modal-sub{font-size:12px;color:#AAA;margin-bottom:1.25rem}
  .modal-krow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.25rem}
  .modal-kpi{border-radius:8px;padding:.75rem 1rem;text-align:center}
  .modal-kpi .ml{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
  .modal-kpi .mv{font-size:18px;font-weight:500;line-height:1}
  .modal-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#AAA;margin-bottom:.6rem;margin-top:1rem}
  .modal-info-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F5F5F5;font-size:13px}
  .modal-info-row:last-child{border:none}
  .modal-info-label{color:#AAA}
  .modal-info-val{font-weight:600}
  .devis-mini{width:100%;border-collapse:collapse;font-size:12px;margin-top:.5rem}
  .devis-mini th{text-align:left;padding:6px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#AAA;border-bottom:1px solid #F0F0F0;background:#FAFAFA}
  .devis-mini td{padding:7px 8px;border-bottom:1px solid #F7F7F7}
  .devis-mini tr:last-child td{border:none}
</style>
</head>

        // Barre budget (consommé/enveloppe) - uniquement si enveloppe > 0
        var budgetPct=p.env>0?Math.min(Math.round(getConsomme(p)/p.env*100),100):0;
        var budgetCol=budgetPct>85?"#C62828":budgetPct>65?"#FFCC00":"#4CAF50";
        var budBar=p.env>0?'<div style="width:100%;margin-top:3px;display:flex;align-items:center;gap:4px"><span style="font-size:9px;color:rgba(0,0,0,.35);flex-shrink:0">€</span><div style="flex:1;height:4px;background:rgba(0,0,0,.08);border-radius:2px;overflow:hidden"><div style="width:'+budgetPct+'%;height:4px;background:'+budgetCol+';border-radius:2px"></div></div></div>':'';
        // y:-1=au-dessus, y:1=en dessous, y:-2=encore plus haut, y:2=encore plus bas
        // y négatif = au-dessus, y positif = en dessous
        var abspy=Math.abs(py);
        var side=py<0?'bottom:calc(58% + '+abspy+'px)':'top:calc(42% + '+abspy+'px)';
        out+='<div style="position:absolute;left:'+px+'px;transform:translateX(-50%);top:0;bottom:0;z-index:5">';
        out+='<div style="position:absolute;'+side+';transform:translateX(-50%);display:flex;flex-direction:column;align-items:center">';
        if(py>0 && NO_TRAIT.indexOf(p.nom)===-1) out+='<div style="width:2px;height:'+abspy+'px;background:rgba(0,0,0,.15)"></div>';
        out+='<div onclick="showProjDetail('+item.idx+')" style="cursor:pointer;background:#fff;border:2px solid '+bord+';border-radius:8px;padding:11px 9px;font-size:13px;font-weight:600;color:'+stCol+';white-space:nowrap;max-width:none;text-align:center;line-height:1.3;letter-spacing:.01em;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:52px">'+p.nom+avBar+budBar+'</div>';
        if(py<0 && NO_TRAIT.indexOf(p.nom)===-1) out+='<div style="width:2px;height:'+abspy+'px;background:rgba(0,0,0,.15)"></div>';
        out+='</div></div>';
      });
    });
    out+='</div>';
    return out;
  }

  h+='<div class="card" style="margin-bottom:.9rem"><div class="card-h"><span class="ct">Roadmap investissements 2026</span></div>';
  h+=renderLigne(moisAvecProjets,true);
  h+='</div>';



  document.getElementById('syn').innerHTML=h;

  dc('cDoSyn');CH['cDoSyn']=new Chart(document.getElementById('cDoSyn'),{type:'doughnut',data:{labels:['Consommé','Disponible'],datasets:[{data:[tc,te-tc],backgroundColor:['#D40511','#F5F5F5'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'78%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(i){return ff(i.raw);}}}}}});

}

function renderPro(){
  syncConsomme();
  var stG={};D.projets.forEach(function(p){stG[p.st]=(stG[p.st]||0)+1;});
  var today=new Date(),in30=new Date();in30.setDate(today.getDate()+30);
  var jUp=D.projets.filter(function(p){var d=new Date(p.ech);return d>=today&&d<=in30&&p.st!=="Terminé";});
  var stCols={"En cours":"#D40511","Planifié":"#BBBBBB","Terminé":"#1A1A1A","En retard":"#FFCC00"};
  var h='<div class="hbar"><span class="ht">Avancement — Projets</span><span class="hd">'+new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})+'</span></div>';
  h+='<div class="krow">';D.projets.forEach(function(p){var cl=p.av>=70?"kg":p.av>=30?"ky":"kr";h+='<div class="kpi '+cl+'"><div class="kl" style="font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.nom+'</div><div class="kv" style="font-size:22px">'+p.av+'%</div><div class="ks">'+p.st+'</div><div class="kbar"></div></div>';});h+='</div>';
  h+='<div class="card"><div class="card-h"><span class="ct">Tableau de pilotage</span></div><div style="overflow-x:auto"><table style="table-layout:auto"><thead><tr><th>Projet</th><th>Chef de projet</th><th>Priorité</th><th>Statut</th><th>Avancement</th><th>Échéance</th><th>Risque</th></tr></thead><tbody>';
  D.projets.forEach(function(p){h+='<tr><td style="font-weight:700">'+p.nom+'</td><td style="color:var(--light);font-size:11px">'+p.chef+'</td><td>'+pp2(p.prio)+'</td><td>'+sp(p.st)+'</td><td style="min-width:110px"><div style="display:flex;align-items:center;gap:6px"><div class="pbar" style="width:70px"><div class="pf" style="width:'+p.av+'%;background:'+(p.av>=70?'#1A1A1A':'#D40511')+'"></div></div><span style="font-size:11px;font-weight:700;color:'+(p.av>=70?'#1A1A1A':'#D40511')+'">'+p.av+'%</span></div></td><td style="font-size:11px;color:var(--light)">'+p.ech+'</td><td>'+rp(p.risq)+'</td></tr>';});
  h+='</tbody></table></div></div>';
  h+='<div class="g2"><div class="card"><div class="card-h"><span class="ct">Répartition des statuts</span></div><div style="display:flex;align-items:center;gap:1rem"><div class="ch" style="height:130px;width:130px;flex-shrink:0"><canvas id="cSt"></canvas></div><div style="flex:1;display:flex;flex-direction:column;gap:8px">';
  Object.keys(stG).forEach(function(s){h+='<div><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;font-weight:600">'+s+'</span><span style="font-size:11px;font-weight:700;color:'+(stCols[s]||'#888')+'">'+stG[s]+'</span></div><div class="pbar"><div class="pf" style="width:'+pt(stG[s],D.projets.length)+'%;background:'+(stCols[s]||'#888')+'"></div></div></div>';});
  h+='</div></div></div><div class="card"><div class="card-h"><span class="ct">Échéances &lt; 30 jours</span></div>';
  if(jUp.length===0){h+='<div style="font-size:12px;color:var(--light);padding:.5rem 0">Aucune échéance imminente.</div>';}
  else{jUp.forEach(function(p){h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F5F5F5"><div><div style="font-size:12px;font-weight:700">'+p.nom+'</div><div style="font-size:10px;color:var(--light);margin-top:2px">'+p.chef+'</div></div><div style="text-align:right"><div style="font-size:10px;color:var(--light);margin-bottom:3px">'+p.ech+'</div>'+rp(p.risq)+'</div></div>';});}
  h+='</div></div>';
  document.getElementById('pro').innerHTML=h;
  dc('cSt');var stKeys=Object.keys(stG);CH['cSt']=new Chart(document.getElementById('cSt'),{type:'doughnut',data:{labels:stKeys,datasets:[{data:stKeys.map(function(s){return stG[s];}),backgroundColor:stKeys.map(function(s){return stCols[s]||'#888';}),borderWidth:0,hoverOffset:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false}}}});
}

// ══════════════════════════════════════════════════════
// VUE DONNÉES
// ══════════════════════════════════════════════════════
var STS=["Planifié","En cours","Terminé"];
var PRIOS=["Critique","Haute","Moyenne","Faible"];
var RISQS=["Élevé","Moyen","Faible","Aucun"];
var CHEFS=["Théo.D","Jérémy.B","Nicolas.B","Gilles.M","David.B","Phillipe.M","Fred.B","Georges.D"];
function selOpts(arr,val){return arr.map(function(s){return'<option'+(s===val?' selected':'')+'>'+s+'</option>';}).join('');}

function renderDat(){
  var h='<div class="hbar"><span class="ht">Saisie des données</span><span class="hd">Sauvegardé automatiquement dans votre navigateur</span></div>';

  // ── 1. PROJETS ──
  h+='<div class="card"><div class="card-h"><span class="ct">Projets</span><span style="font-size:10px;color:var(--light)">'+D.projets.length+' projet(s)</span></div>';
  h+='<div style="overflow-x:auto"><table class="dat-table"><thead><tr><th>Nom du projet</th><th>Chef de projet</th><th>Avanc. %</th><th>Statut</th><th>Priorité</th><th>Échéance</th><th>Risque</th><th style="width:36px"></th></tr></thead><tbody>';
  D.projets.forEach(function(p,i){
    h+='<tr>'
      +'<td><input type="text" class="dat-input" value="'+p.nom+'" onchange="D.projets['+i+'].nom=this.value" style="min-width:150px"></td>'
      +'<td><select class="dat-input" onchange="D.projets['+i+'].chef=this.value" style="min-width:130px"><option value="">-- Choisir --</option>'+selOpts(CHEFS,p.chef)+'</select></td>'
      +'<td><input type="number" class="dat-input" min="0" max="100" value="'+p.av+'" onchange="D.projets['+i+'].av=+this.value" style="width:65px"></td>'
      +'<td><select class="dat-input" onchange="D.projets['+i+'].st=this.value" style="min-width:105px">'+selOpts(STS,p.st)+'</select></td>'
      +'<td><select class="dat-input" onchange="D.projets['+i+'].prio=this.value" style="min-width:95px">'+selOpts(PRIOS,p.prio)+'</select></td>'
      +'<td><input type="date" class="dat-input" value="'+p.ech+'" onchange="D.projets['+i+'].ech=this.value" style="width:135px"></td>'
      +'<td><select class="dat-input" onchange="D.projets['+i+'].risq=this.value" style="min-width:88px">'+selOpts(RISQS,p.risq)+'</select></td>'
      +'<td><button class="btn-del" onclick="delProjet('+i+')" title="Supprimer">✕</button></td>'
      +'</tr>';
  });
  h+='</tbody></table></div><div class="btn-row"><button class="btn-add" onclick="addProjet()">+ Ajouter un projet</button></div></div>';

  // ── 2. FINANCE PAR PROJET ──
  h+='<div class="card"><div class="card-h"><span class="ct">Finance — Enveloppes & devis par projet</span></div>';
  D.projets.forEach(function(p,pi){
    var cons=getConsomme(p);
    var pct=p.env>0?Math.round(cons/p.env*100):0;
    var col=pct>85?"#C62828":pct>65?"#F57F17":"#2E7D32";
    var bgPill=pct>85?"#FDE8E8":pct>65?"#FFF8D6":"#E8F5E9";
    h+='<div class="fin-proj-block">';
    // Header cliquable
    h+='<div class="fin-proj-header" onclick="toggleBlock('+pi+')">';
    h+='<div class="fin-proj-title"><span style="font-size:10px;color:var(--light)">▶</span>'+p.nom+'</div>';
    h+='<div class="fin-proj-stats">';
    h+='<span style="font-size:12px;color:var(--mid)">Enveloppe : <strong>'+ffFull(p.env)+'</strong></span>';
    h+='<span style="font-size:12px;font-weight:700;color:'+col+'">Consommé : '+ffFull(cons)+'</span>';
    h+='<span style="font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;background:'+bgPill+';color:'+col+'">'+pct+'%</span>';
    h+='</div></div>';
    // Corps (déplié par défaut)
    h+='<div class="fin-proj-body" id="finblock-'+pi+'">';
    // Enveloppe
    h+='<div class="env-row">';
    h+='<span class="env-label">Enveloppe totale</span>';
    h+='<input type="number" class="env-input" value="'+p.env+'" onchange="D.projets['+pi+'].env=+this.value;renderDat()" placeholder="0">';
    h+='<span style="font-size:12px;color:var(--mid)">€</span>';
    h+='</div>';
    // Barre progression
    h+='<div style="margin-bottom:1rem">';
    h+='<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px">';
    h+='<span style="color:var(--light)">Consommé : <strong style="color:'+col+'">'+ffFull(cons)+'</strong></span>';
    h+='<span style="color:var(--light)">Disponible : <strong style="color:var(--dark)">'+ffFull(Math.max(0,p.env-cons))+'</strong></span>';
    h+='</div>';
    h+='<div class="pbar" style="height:7px;border-radius:4px"><div class="pf" style="width:'+Math.min(pct,100)+'%;background:'+col+';height:7px;border-radius:4px"></div></div>';
    h+='<div style="font-size:10px;color:'+col+';font-weight:700;margin-top:4px">'+pct+'% de l\'enveloppe engagé</div>';
    h+='</div>';
    // Table devis
    h+='<table class="devis-table">';
    h+='<thead><tr><th style="width:28px">N°</th><th>Motif du devis</th><th style="width:160px">Montant</th><th style="width:36px"></th></tr></thead>';
    h+='<tbody>';
    if(!p.devis||p.devis.length===0){
      h+='<tr><td colspan="4" style="color:var(--light);font-size:11px;padding:10px 8px;font-style:italic">Aucun devis enregistré</td></tr>';
    } else {
      p.devis.forEach(function(d,di){
        h+='<tr>'
          +'<td style="color:var(--light);font-size:11px">'+(di+1)+'</td>'
          +'<td><input type="text" value="'+d.motif+'" onchange="D.projets['+pi+'].devis['+di+'].motif=this.value" placeholder="Motif du devis..." style="min-width:220px"></td>'
          +'<td><div style="display:flex;align-items:center;gap:5px"><input type="number" value="'+d.montant+'" onchange="D.projets['+pi+'].devis['+di+'].montant=+this.value;updateFinBlock('+pi+')"><span style="font-size:11px;color:var(--light)">€</span></div></td>'
          +'<td><button class="btn-del" onclick="delDevis('+pi+','+di+')">✕</button></td>'
          +'</tr>';
      });
    }
    h+='</tbody></table>';
    // Footer total + bouton
    h+='<div class="devis-footer">';
    h+='<button class="btn-add-sm" onclick="addDevis('+pi+')">+ Ajouter un devis</button>';
    h+='<div class="devis-total-zone"><span class="devis-total-label">Total engagé :</span><span class="devis-total-val" style="color:'+col+'" id="dtotal-'+pi+'">'+ffFull(cons)+'</span></div>';
    h+='</div>';
    h+='</div></div>'; // fin body + bloc
  });
  h+='</div>'; // fin card finance

  // ── 3. TENDANCE ──
  h+='<div class="card"><div class="card-h"><span class="ct">Tendance mensuelle des dépenses</span></div>';
  h+='<table class="trend-table"><thead><tr><th>Mois</th><th>Dépenses cumulées (€)</th><th style="width:36px"></th></tr></thead><tbody>';
  D.trend.forEach(function(t,i){h+='<tr><td><input type="text" value="'+t.m+'" onchange="D.trend['+i+'].m=this.value" style="width:70px"></td><td><input type="number" value="'+t.v+'" onchange="D.trend['+i+'].v=+this.value" style="width:130px"></td><td><button class="btn-del" onclick="delTrend('+i+')">✕</button></td></tr>';});
  h+='</tbody></table><div class="btn-row"><button class="btn-add-sm" onclick="addTrend()">+ Ajouter un mois</button></div></div>';

  h+='<div class="btn-row"><button class="savebtn" onclick="saveAndRefresh()">Enregistrer et actualiser le dashboard</button></div>';
  document.getElementById('dat').innerHTML=h;
}

function toggleBlock(pi){
  var el=document.getElementById('finblock-'+pi);
  if(el) el.classList.toggle('collapsed');
}

function updateFinBlock(pi){
  var cons=getConsomme(D.projets[pi]);
  var pct=D.projets[pi].env>0?Math.round(cons/D.projets[pi].env*100):0;
  var col=pct>85?"#C62828":pct>65?"#F57F17":"#2E7D32";
  var el=document.getElementById('dtotal-'+pi);
  if(el){el.textContent=ffFull(cons);el.style.color=col;}
}

function addIntervention(pi){
  if(!D.projets[pi].interventions) D.projets[pi].interventions=[];
  D.projets[pi].interventions.push({date:"",description:""});
  renderDat();
  var el=document.getElementById('finblock-'+pi);
  if(el) el.classList.remove('collapsed');
}
function delIntervention(pi,ii){
  D.projets[pi].interventions.splice(ii,1);
  renderDat();
}
function addDevis(pi){
  if(!D.projets[pi].devis) D.projets[pi].devis=[];
  D.projets[pi].devis.push({motif:"",montant:0});
  renderDat();
  var el=document.getElementById('finblock-'+pi);
  if(el) el.classList.remove('collapsed');
}

function delDevis(pi,di){
  D.projets[pi].devis.splice(di,1);
  renderDat();
}

function addProjet(){
  D.projets.push({nom:"Projet "+(D.projets.length+1),chef:"",env:0,av:0,st:"Planifié",prio:"Moyenne",ech:"",risq:"Faible",devis:[],interventions:[]});
  renderDat();
}

function delProjet(i){
  if(D.projets.length<=1){toast("Il faut au moins un projet.",false);return;}
  if(confirm('Supprimer "'+D.projets[i].nom+'" ?')){D.projets.splice(i,1);renderDat();}
}

function addTrend(){D.trend.push({m:"Mois",v:0});renderDat();}
function delTrend(i){if(D.trend.length<=1){toast("Il faut au moins un mois.",false);return;}D.trend.splice(i,1);renderDat();}

function exportHTML(){
  syncConsomme();
  var src=document.documentElement.outerHTML;
  // Remplacer les données par défaut par les données actuelles
  var dataStr=JSON.stringify(D);
  src=src.replace(/var DEFAULT_D=\{[\s\S]*?\};\s*function loadLocal/,
    'var DEFAULT_D='+dataStr+';\nfunction loadLocal');
  // Forcer le chargement des données exportées
  src=src.replace("localStorage.getItem('dhl_v8')",
    "null /* export */");
  var blob=new Blob([src],{type:'text/html'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='dashboard-projets.html';
  a.click();
  toast("Fichier exporté avec vos données !");
}

function saveAndRefresh(){
  syncConsomme();
  saveLocal();
  renderFin();renderSyn();renderPro();renderDat();
  toast("Données sauvegardées !");
}

function refreshCurrentView(){
  if(currentView==='fin')renderFin();
  else if(currentView==='syn')renderSyn();
  else if(currentView==='pro')renderPro();
  else if(currentView==='dat')renderDat();
}

function go(id,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('act');});
  document.getElementById(id).classList.add('on');
  btn.classList.add('act');
  currentView=id;
  if(id==='fin')renderFin();
  else if(id==='syn')renderSyn();
  else if(id==='pro')renderPro();
  else if(id==='dat')renderDat();
}

renderSyn();
document.getElementById('lastUpdate').textContent="Mis à jour : "+new Date().toLocaleTimeString('fr-FR');
</script>
</body>
